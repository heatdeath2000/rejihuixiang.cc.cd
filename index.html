<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rejihuixiang · 视频</title>
    <style>
        /* 极简高冷：全黑背景，只有视频，没有多余文字 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* 用容器让视频居中，并保留一点呼吸空间 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* 只有一条极细的线作为标题，几乎看不见但保持调性 */
        .site-title {
            margin-bottom: 2rem;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 1rem;
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #4f4f4f;
            text-transform: uppercase;
        }

        /* 视频容器：16:9，黑底，轻微边框 */
        .video-wrapper {
            aspect-ratio: 16 / 9;
            width: 100%;
            background: #000;
            border: 1px solid #2a2a2a;
            box-shadow: 0 10px 30px -15px #000;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            display: block;
            border: none;
        }

        /* 极简脚注，只有最必要的信息 */
        footer {
            margin-top: 2rem;
            border-top: 1px solid #1f1f1f;
            padding-top: 1rem;
            color: #3f3f3f;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: right;
        }

        /* 响应式：小屏时减少边距 */
        @media (max-width: 600px) {
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 几乎看不见的标题，只为保留一丝气息 -->
        <div class="site-title">REJIHUIXIANG // VIDEO</div>

        <!-- 视频播放器 —— 主角 -->
        <div class="video-wrapper">
            <!-- 您指定的B站嵌入代码，已优化参数（关弹幕、默认高清） -->
            <iframe 
                src="//player.bilibili.com/player.html?bvid=BV1n46nBoE2C&p=1&autoplay=0&danmaku=0&high_quality=1&as_wide=1"
                allowfullscreen>
            </iframe>
        </div>

        <!-- 极简脚注 -->
        <footer>
            <span>© 2026</span>
        </footer>
    </div>
</body>
</html>
